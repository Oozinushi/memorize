<!DOCTYPE html> 
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暗記</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  :root{
    --bg:#12131a; --panel:#1a1c27; --panel2:#232636; --panel3:#2b2f44;
    --ink:#e9eaf2; --sub:#9096ae; --line:#2e3247;
    --accent:#7dd3c0; --accent2:#f2b872; --ok:#4caf82; --ng:#e0685a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;
    padding:0; overscroll-behavior:none}
  .wrap{max-width:640px; margin:0 auto; padding:14px 14px 80px; min-height:100vh}
  h1{font-size:20px; margin:0 0 2px}
  .date{font-size:12px; color:var(--sub); margin-bottom:14px}
  button{font-family:inherit; cursor:pointer; border:none}
  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px}
  .tabs button{background:none; padding:9px 15px; font-size:14px; font-weight:600;
    color:var(--sub); border-bottom:2px solid transparent; margin-bottom:-1px}
  .tabs button.on{color:var(--accent); border-bottom-color:var(--accent)}
  .chipbar{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; margin-bottom:12px}
  .chip{flex-shrink:0; padding:7px 15px; border-radius:16px; font-size:13px; font-weight:600;
    border:1px solid var(--line); background:transparent; color:var(--sub); white-space:nowrap}
  .chip.on{background:var(--accent); color:#10202a; border-color:var(--accent)}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:14px}

  /* home */
  .big{font-size:52px; font-weight:800; color:var(--accent); text-align:center; line-height:1.1}
  .biglabel{font-size:14px; color:var(--sub); text-align:center; margin-bottom:18px}
  .btn{display:block; width:100%; padding:16px; border-radius:12px; font-size:16px; font-weight:700;
    background:var(--accent); color:#10202a; margin-bottom:10px}
  .btn.ghost{background:transparent; color:var(--sub); border:1px solid var(--line)}
  .btn.sm{padding:10px; font-size:14px}
  .btn:disabled{opacity:.4}
  .seg{display:flex; gap:8px; justify-content:center; margin-bottom:16px}
  .seg button{padding:8px 18px; border-radius:16px; font-size:13px; background:transparent;
    border:1px solid var(--line); color:var(--sub)}
  .seg button.on{border-color:var(--accent); color:var(--ink); background:var(--panel3)}

  /* session */
  .pbar{height:5px; background:var(--panel3); border-radius:3px; overflow:hidden; margin-bottom:14px}
  .pfill{height:100%; background:var(--accent); transition:width .2s}
  .stop{display:flex; justify-content:space-between; font-size:13px; color:var(--sub); margin-bottom:12px}
  .badge{padding:2px 10px; border-radius:12px; background:var(--panel3); font-size:11px}
  .flash{background:var(--panel2); border:1px solid var(--line); border-radius:16px;
    padding:36px 20px; min-height:190px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; margin-bottom:16px}
  .front{font-size:24px; font-weight:600; line-height:1.5}
  .divider{width:44%; height:1px; background:var(--line); margin:22px 0}
  .back{font-size:21px; line-height:1.6; color:var(--accent)}
  .hint{margin-top:22px; font-size:12px; color:#5a5f78}
  .cloze{display:inline-block; padding:1px 8px; margin:0 2px; border-radius:6px;
    background:var(--panel3); color:var(--accent2); cursor:pointer; border:1px dashed var(--accent2);
    min-width:40px; text-align:center; vertical-align:middle}
  .cloze.open{background:transparent; color:var(--accent); border-style:solid; border-color:var(--accent)}
  .figure{background:#fff; border-radius:10px; padding:10px; margin-top:14px; width:100%; max-width:340px}
  .figure svg{display:block; width:100%; height:auto}
  .acts{display:flex; gap:10px; margin-bottom:10px}
  .acts .btn{margin-bottom:0}
  .ok{background:var(--ok); color:#fff} .ng{background:var(--ng); color:#fff}

  /* dashboard */
  .dtitle{font-size:15px; font-weight:700} .dsub{font-size:12px; color:var(--sub); margin:3px 0 14px}
  .boxes{display:flex; gap:8px; align-items:flex-end; justify-content:space-around; height:100px}
  .bcol{display:flex; flex-direction:column; align-items:center; gap:3px; flex:1}
  .bbar{width:56%; max-width:38px; background:var(--accent); border-radius:4px 4px 0 0; min-height:4px}
  .bbar.m{background:var(--ok)}
  .bnum{font-size:12px; font-weight:700} .blabel{font-size:10px; color:var(--sub)}

  /* manage */
  textarea{width:100%; padding:11px; border-radius:8px; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); font-family:ui-monospace,monospace; font-size:13px; resize:vertical}
  .row{display:flex; gap:8px; align-items:center; margin:10px 0}
  .num{width:70px; padding:9px; border-radius:8px; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); font-size:15px; text-align:center}
  label{font-size:13px; color:var(--sub)}
  .msg{font-size:13px; color:var(--accent2); margin:8px 0; min-height:18px}
  .empty{color:var(--sub); font-size:14px; text-align:center; padding:44px 20px; line-height:1.7}
  .quit{text-align:center; margin-top:4px}
  .endsub{font-size:14px; color:var(--sub); text-align:center; line-height:1.6; margin-bottom:18px}
  .endtitle{font-size:20px; font-weight:700; text-align:center; margin-bottom:8px}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex;
    align-items:center; justify-content:center; padding:24px; z-index:100}
  .modal{background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:22px; max-width:340px; width:100%}
  .modal-msg{font-size:15px; line-height:1.6; margin-bottom:20px}
  .modal-btns{display:flex; gap:10px}
  .modal-btns button{flex:1; padding:13px; border-radius:10px; font-size:15px; font-weight:700}
  .modal-cancel{background:var(--panel3); color:var(--ink)}
  .modal-ok{background:var(--ng); color:#fff}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";

// ============ storage ============
const LS_KEY = "memorize_v1";
const DEFAULTS = { cards:[], tracks:[{id:"normal", name:"通常", dailyLimit:25}], settings:{}, meta:{} };

function load(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) return migrate(JSON.parse(raw)); }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// 旧形式（card直下にbox/dueDate/phase/history、settings.dailyLimit）を
// 新形式（card.progress[trackId]、tracks[]）へ移行
function migrate(s){
  if(!s.tracks){
    const limit = (s.settings && s.settings.dailyLimit) || 25;
    s.tracks = [{id:"normal", name:"通常", dailyLimit:limit}];
  }
  if(!s.tracks.find(t=>t.id==="normal")){
    s.tracks.unshift({id:"normal", name:"通常", dailyLimit:25});
  }
  for(const c of (s.cards||[])){
    if(!c.progress){
      c.progress = { normal: {
        box: c.box||1, dueDate: c.dueDate||todayStr(),
        phase: c.phase||"new", history: c.history||[]
      }};
      delete c.box; delete c.dueDate; delete c.phase; delete c.history;
    }
  }
  if(!s.settings) s.settings = {};
  return s;
}
let state = load();

// トラック補助
function getTrack(id){ return state.tracks.find(t=>t.id===id); }
function cardsInTrack(trackId){ return state.cards.filter(c=>c.progress && c.progress[trackId]); }
function prog(c, trackId){ return c.progress[trackId]; }

// ============ date utils ============
function todayStr(d=new Date()){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addDays(ds, n){ const d=new Date(ds+"T00:00:00"); d.setDate(d.getDate()+n); return todayStr(d); }

// ============ Leitner ============
const BOX_INTERVAL = {1:0,2:1,3:2,4:4,5:8};
// 個別トラック用: 習得しても間隔を有限に抑え、必ず巡ってくるようにする（最大3日）
const FOCUS_INTERVAL = {1:0,2:1,3:1,4:2,5:3};
const MAX_BOX = 5;
function impFactor(imp){ return imp>=3?0.5 : imp===2?0.75 : 1.0; }

// phase: "new"(未学習) / "night_done"(前夜暗記済→朝待ち) / "review"(箱で抜き打ち)
// applyMorning: 朝テスト(通常)または個別テストの正誤で箱を更新
function applyReview(c, trackId, correct, slot){
  const today = todayStr();
  const p = prog(c, trackId);
  p.history = p.history||[];
  p.history.push({date:today, slot, correct});
  if(p.history.length>20) p.history = p.history.slice(-20);
  if(correct){
    p.box = Math.min(MAX_BOX, (p.box||1)+1);
    const isNormal = trackId==="normal";
    const base = isNormal ? BOX_INTERVAL[p.box] : FOCUS_INTERVAL[p.box];
    const iv = Math.max(1, Math.round(base*impFactor(c.importance)));
    p.dueDate = addDays(today, iv);
    p.phase = "review";
  }else{
    p.box = 1;
    p.dueDate = today;
    p.phase = "new";
  }
}

function markNightDone(c, trackId){ prog(c, trackId).phase = "night_done"; }

// effective priority（選抜順・出題順）
function eprio(c, trackId){
  const p = prog(c, trackId);
  const recent = (p.history||[]).slice(-5);
  const wrong = recent.length ? recent.filter(h=>!h.correct).length/recent.length : 0.5;
  const imp = ((c.importance||1)-1)/2;
  const boxScore = (MAX_BOX-(p.box||1))/(MAX_BOX-1);
  return imp*0.4 + boxScore*0.3 + wrong*0.3;
}

// 通常トラック：夜の対象 phase="new" を重要度優先で日次上限まで
function nightTargets(trackId){
  const t = getTrack(trackId);
  const limit = (t && t.dailyLimit) || 25;
  const pool = cardsInTrack(trackId).filter(c=>prog(c,trackId).phase==="new");
  pool.sort((a,b)=> (b.importance-a.importance) || (eprio(b,trackId)-eprio(a,trackId)));
  return pool.slice(0, limit);
}
// 通常トラック：朝の対象 night_done ＋ review&due
function morningTargets(trackId){
  const today = todayStr();
  const night = cardsInTrack(trackId).filter(c=>prog(c,trackId).phase==="night_done");
  const ambush = cardsInTrack(trackId).filter(c=>{ const p=prog(c,trackId); return p.phase==="review" && p.dueDate<=today; });
  const all = night.concat(ambush);
  all.sort((a,b)=> eprio(b,trackId)-eprio(a,trackId));
  return all;
}
// 個別トラック：いつでも回せる。今日出す分 = new(未学習) ＋ due が来た review
function focusTargets(trackId){
  const today = todayStr();
  const pool = cardsInTrack(trackId).filter(c=>{
    const p=prog(c,trackId);
    return p.phase==="new" || p.phase==="night_done" || (p.phase==="review" && p.dueDate<=today);
  });
  pool.sort((a,b)=> eprio(b,trackId)-eprio(a,trackId));
  const t=getTrack(trackId); const limit=(t&&t.dailyLimit)||9999;
  return pool.slice(0, limit);
}

// ============ math render ============
function renderInto(el, text){
  el.innerHTML = "";
  appendFragment(el, text);
}
// 断片（テキスト＋inline数式）を要素に追記
function appendFragment(el, text){
  const parts = String(text||"").split(/(\$[^$]+\$)/g);
  for(const p of parts){
    if(p.startsWith("$")&&p.endsWith("$")){
      const span = document.createElement("span");
      try{ if(window.katex) katex.render(p.slice(1,-1), span, {throwOnError:false}); else span.textContent=p; }
      catch{ span.textContent=p; }
      el.appendChild(span);
    }else if(p){ el.appendChild(document.createTextNode(p)); }
  }
}
// 穴埋め描画: 【答え】 を個別にタップ開閉できる空欄にする。
// 区切りに【】を使うのはLaTeXの波括弧{}と衝突しないため（中身に数式$...$や}を含めてよい）。
// 旧記法 {{...}} も後方互換で受け付ける。
function clozeRegex(){ return /(【[\s\S]*?】|\{\{[\s\S]*?\}\})/g; }
function clozeInner(part){
  let m = part.match(/^【([\s\S]*?)】$/);
  if(m) return m[1];
  m = part.match(/^\{\{([\s\S]*?)\}\}$/);
  if(m) return m[1];
  return null;
}
function renderCloze(el, text, openStates, onToggle){
  el.innerHTML = "";
  const parts = String(text||"").split(clozeRegex());
  let blankIdx = 0;
  for(const part of parts){
    const inner = clozeInner(part);
    if(inner!==null){
      const idx = blankIdx++;
      const chip = document.createElement("span");
      chip.className = "cloze" + (openStates[idx] ? " open" : "");
      if(openStates[idx]) appendFragment(chip, inner);
      else chip.textContent = "　？　";
      chip.onclick = (e)=>{ e.stopPropagation(); onToggle(idx); };
      el.appendChild(chip);
    }else if(part){ appendFragment(el, part); }
  }
  return blankIdx;
}
function countBlanks(text){
  const m = String(text||"").match(/【[\s\S]*?】|\{\{[\s\S]*?\}\}/g);
  return m ? m.length : 0;
}
// SVG図を白背景カードで差し込む
function appendFigure(container, svg){
  if(!svg) return;
  const fig=document.createElement("div"); fig.className="figure";
  fig.innerHTML = svg;
  container.appendChild(fig);
}

// ============ confirm modal（confirm()が効かない環境向け） ============
function confirmModal(message, onYes){
  const ov=document.createElement("div"); ov.className="overlay";
  const md=document.createElement("div"); md.className="modal";
  const msg=document.createElement("div"); msg.className="modal-msg"; msg.textContent=message;
  const btns=document.createElement("div"); btns.className="modal-btns";
  const cancel=document.createElement("button"); cancel.className="modal-cancel"; cancel.textContent="キャンセル";
  const ok=document.createElement("button"); ok.className="modal-ok"; ok.textContent="消去する";
  cancel.onclick=()=>document.body.removeChild(ov);
  ok.onclick=()=>{ document.body.removeChild(ov); onYes(); };
  btns.appendChild(cancel); btns.appendChild(ok);
  md.appendChild(msg); md.appendChild(btns); ov.appendChild(md);
  ov.onclick=(e)=>{ if(e.target===ov) document.body.removeChild(ov); };
  document.body.appendChild(ov);
}

// ============ app state (view) ============
let view = { tab:"home", slot:"night", session:null, activeTrack:"normal" };
// session = { mode:"study"|"test", cards:[], idx:0, revealed:false, wrongIds:[] }

const app = document.getElementById("app");

function render(){
  app.innerHTML = "";
  if(view.session){ renderSession(); return; }
  const h = document.createElement("h1"); h.textContent="暗記"; app.appendChild(h);
  const d = document.createElement("div"); d.className="date"; d.textContent=todayStr(); app.appendChild(d);

  const tabs = document.createElement("div"); tabs.className="tabs";
  [["home","今日"],["dash","進捗"],["manage","管理"]].forEach(([id,label])=>{
    const b=document.createElement("button"); b.textContent=label; if(view.tab===id)b.className="on";
    b.onclick=()=>{view.tab=id; render();}; tabs.appendChild(b);
  });
  app.appendChild(tabs);

  if(view.tab==="home") renderHome();
  else if(view.tab==="dash") renderDash();
  else renderManage();
}

function renderHome(){
  if(state.cards.length===0){
    const e=document.createElement("div"); e.className="empty";
    e.textContent="まだカードがありません。「管理」タブから、担当チャットが作ったカードJSONをインポートしてください。";
    app.appendChild(e); return;
  }
  // トラック選択（通常＋個別）
  if(!getTrack(view.activeTrack)) view.activeTrack="normal";
  const trackBar=document.createElement("div"); trackBar.className="chipbar";
  for(const t of state.tracks){
    const n = cardsInTrack(t.id).length;
    if(t.id!=="normal" && n===0) continue; // 空の個別トラックは隠す
    const chip=document.createElement("button"); chip.className="chip"+(view.activeTrack===t.id?" on":"");
    chip.textContent = t.id==="normal" ? t.name : `${t.name}`;
    chip.onclick=()=>{ view.activeTrack=t.id; render(); };
    trackBar.appendChild(chip);
  }
  app.appendChild(trackBar);

  const trackId = view.activeTrack;
  const isNormal = trackId==="normal";
  const c=document.createElement("div"); c.className="card";

  if(isNormal){
    // 夜朝サイクル
    const night = nightTargets(trackId);
    const morning = morningTargets(trackId);
    const seg=document.createElement("div"); seg.className="seg";
    const nb=document.createElement("button"); nb.textContent="夜（暗記）";
    const mb=document.createElement("button"); mb.textContent="朝（テスト）";
    const setSlot=s=>{view.slot=s; nb.className=s==="night"?"on":""; mb.className=s==="morning"?"on":""; drawCount();};
    nb.onclick=()=>setSlot("night"); mb.onclick=()=>setSlot("morning");
    const hour=new Date().getHours(); if(!view.slot) view.slot=(hour>=4&&hour<12)?"morning":"night";
    c.appendChild(seg); seg.appendChild(nb); seg.appendChild(mb);
    const bigWrap=document.createElement("div"); c.appendChild(bigWrap);
    function drawCount(){
      bigWrap.innerHTML="";
      const n = view.slot==="night" ? night.length : morning.length;
      const big=document.createElement("div"); big.className="big"; big.textContent=n; bigWrap.appendChild(big);
      const lbl=document.createElement("div"); lbl.className="biglabel";
      lbl.textContent = view.slot==="night"
        ? (n? "枚を今夜覚えます" : "今夜の暗記対象はありません")
        : (n? "枚が朝のテスト対象です" : "朝のテスト対象はありません");
      bigWrap.appendChild(lbl);
      if(view.slot==="night" && n>0){
        const b=document.createElement("button"); b.className="btn"; b.textContent="暗記を始める";
        b.onclick=()=>startSession("study", night, trackId); bigWrap.appendChild(b);
      }
      if(view.slot==="morning" && n>0){
        const b=document.createElement("button"); b.className="btn"; b.textContent="朝のテストを始める";
        b.onclick=()=>startSession("test", morning, trackId); bigWrap.appendChild(b);
      }
    }
    setSlot(view.slot);
  }else{
    // 個別トラック：いつでも回せる
    const targets = focusTargets(trackId);
    const allCards = cardsInTrack(trackId).slice().sort((a,b)=>eprio(b,trackId)-eprio(a,trackId));
    const big=document.createElement("div"); big.className="big"; big.textContent=targets.length; c.appendChild(big);
    const lbl=document.createElement("div"); lbl.className="biglabel";
    lbl.textContent = targets.length? "枚が今日の対象です" : "今日の対象はありません";
    c.appendChild(lbl);
    if(targets.length>0){
      const b1=document.createElement("button"); b1.className="btn"; b1.textContent="暗記する";
      b1.onclick=()=>startSession("study", targets, trackId); c.appendChild(b1);
      const b2=document.createElement("button"); b2.className="btn ghost"; b2.textContent="テストする";
      b2.onclick=()=>startSession("test", targets, trackId); c.appendChild(b2);
    }
    // 先取り: 対象が無くても（または対象があっても）全カードを回せる
    if(allCards.length>0){
      const b3=document.createElement("button"); b3.className="btn ghost"; b3.textContent=`先取りで全${allCards.length}枚をテスト`;
      b3.onclick=()=>startSession("test", allCards, trackId); c.appendChild(b3);
    }
    const info=document.createElement("div"); info.className="dsub"; info.style.marginTop="12px"; info.style.textAlign="center";
    info.textContent=`このトラックは好きなときに回せます。習得しても定期的に出続けます。全${cardsInTrack(trackId).length}枚。`;
    c.appendChild(info);
  }
  app.appendChild(c);
}

function startSession(mode, cards, trackId){
  view.session = { mode, cards:cards.slice(), idx:0, revealed:false, wrongIds:[], trackId:trackId||"normal" };
  render();
}

function renderSession(){
  const s=view.session;
  if(s.idx>=s.cards.length){ renderSessionEnd(); return; }
  const c=s.cards[s.idx];
  const isTest = s.mode==="test" || s.mode==="test_night";
  const isCloze = c.type==="cloze";
  // clозカードの空欄開閉状態をセッションに保持
  if(isCloze && !s._clozeStates){ s._clozeStates = []; }
  if(isCloze && !s._clozeStates[s.idx]){ s._clozeStates[s.idx] = new Array(countBlanks(c.front)).fill(false); }

  const pbar=document.createElement("div"); pbar.className="pbar";
  const pf=document.createElement("div"); pf.className="pfill"; pf.style.width=`${s.idx/s.cards.length*100}%`;
  pbar.appendChild(pf); app.appendChild(pbar);

  const top=document.createElement("div"); top.className="stop";
  const l=document.createElement("span"); l.textContent=`${isTest?"確認テスト":"暗記"}  ${s.idx+1}/${s.cards.length}`;
  const r=document.createElement("span"); r.className="badge"; r.textContent=`箱${prog(c,s.trackId).box||1}`;
  top.appendChild(l); top.appendChild(r); app.appendChild(top);

  const flash=document.createElement("div"); flash.className="flash";

  if(isCloze){
    // 穴埋め: front を空欄チップで描画。各空欄をタップで開閉（再タップで穴に戻る）
    const front=document.createElement("div"); front.className="front";
    renderCloze(front, c.front, s._clozeStates[s.idx], (bi)=>{
      s._clozeStates[s.idx][bi] = !s._clozeStates[s.idx][bi];
      render();
    });
    flash.appendChild(front);
    appendFigure(flash, c.figureSVGFront);
    // 裏(補足)があり、全空欄が開いているときに表示
    const allOpen = s._clozeStates[s.idx].every(x=>x);
    if((c.back || c.figureSVGBack) && allOpen){
      const dv=document.createElement("div"); dv.className="divider"; flash.appendChild(dv);
      if(c.back){ const back=document.createElement("div"); back.className="back"; renderInto(back, c.back); flash.appendChild(back); }
      appendFigure(flash, c.figureSVGBack);
    }
    const hint=document.createElement("div"); hint.className="hint"; hint.textContent="空欄をタップで開閉";
    flash.appendChild(hint);
  }else{
    // 通常カード
    const front=document.createElement("div"); front.className="front"; renderInto(front, c.front); flash.appendChild(front);
    appendFigure(flash, c.figureSVGFront);
    if(s.revealed){
      const dv=document.createElement("div"); dv.className="divider"; flash.appendChild(dv);
      const back=document.createElement("div"); back.className="back"; renderInto(back, c.back); flash.appendChild(back);
      appendFigure(flash, c.figureSVGBack);
      if(!isTest){
        const tg=document.createElement("div"); tg.className="hint"; tg.textContent="タップで表に戻す";
        flash.appendChild(tg);
        flash.onclick=()=>{s.revealed=false; render();};
      }
    }else{
      const hint=document.createElement("div"); hint.className="hint"; hint.textContent="タップで答えを表示";
      flash.appendChild(hint);
      flash.onclick=()=>{s.revealed=true; render();};
    }
  }
  app.appendChild(flash);

  // アクション表示の条件: 通常カードは revealed後、clозは常に（空欄を自分で開いて確認する形）
  const showActions = isCloze ? true : s.revealed;
  const acts=document.createElement("div"); acts.className="acts";
  if(showActions){
    if(!isTest){
      const nx=document.createElement("button"); nx.className="btn"; nx.textContent="覚えた・次へ";
      nx.onclick=()=>{ markNightDone(c, s.trackId); save(); s.idx++; s.revealed=false; render(); };
      acts.appendChild(nx);
    }else{
      const ng=document.createElement("button"); ng.className="btn ng"; ng.textContent="できなかった";
      const ok=document.createElement("button"); ok.className="btn ok"; ok.textContent="できた";
      const isNightTest = s.mode==="test_night";
      ng.onclick=()=>{
        s.wrongIds.push(c.id);
        // 夜の確認テストは箱を動かさない（間違いを再暗記ループへ送るのみ）。朝テストのみ箱更新。
        if(!isNightTest){ applyReview(c, s.trackId, false, s.trackId==="normal"?"morning":"focus"); save(); }
        s.idx++; s.revealed=false; render();
      };
      ok.onclick=()=>{
        if(!isNightTest){ applyReview(c, s.trackId, true, s.trackId==="normal"?"morning":"focus"); save(); }
        s.idx++; s.revealed=false; render();
      };
      acts.appendChild(ng); acts.appendChild(ok);
    }
  }
  app.appendChild(acts);

  const q=document.createElement("div"); q.className="quit";
  const qb=document.createElement("button"); qb.className="btn ghost sm"; qb.textContent="中断してホームへ";
  qb.onclick=()=>{ view.session=null; render(); }; q.appendChild(qb); app.appendChild(q);
}

function renderSessionEnd(){
  const s=view.session;
  const c=document.createElement("div"); c.className="card";
  const t=document.createElement("div"); t.className="endtitle"; c.appendChild(t);

  if(s.mode==="study"){
    t.textContent="暗記おつかれさま";
    const sub=document.createElement("div"); sub.className="endsub"; sub.textContent="続けて確認テストをしますか？";
    c.appendChild(sub);
    const go=document.createElement("button"); go.className="btn"; go.textContent="確認テストをする";
    // 夜のテスト：このセッションのカードをテスト
    go.onclick=()=>{ view.session={mode:"test_night", cards:s.cards.slice(), idx:0, revealed:false, wrongIds:[], trackId:s.trackId}; render(); };
    c.appendChild(go);
    const later=document.createElement("button"); later.className="btn ghost"; later.textContent="あとで（ホームへ）";
    later.onclick=()=>{ view.session=null; render(); }; c.appendChild(later);
  }else if(s.mode==="test_night"){
    // 夜の確認テスト終了：間違いだけ暗記に戻すループ
    const wrong = s.cards.filter(x=>s.wrongIds.includes(x.id));
    t.textContent="確認テスト完了";
    const sub=document.createElement("div"); sub.className="endsub";
    if(wrong.length){
      sub.textContent=`${s.cards.length}枚中 ${wrong.length}枚まちがえました。まちがえた分をもう一度覚えましょう。`;
      c.appendChild(sub);
      const again=document.createElement("button"); again.className="btn"; again.textContent=`まちがえた${wrong.length}枚を暗記`;
      again.onclick=()=>{ view.session={mode:"study_loop", cards:wrong.slice(), idx:0, revealed:false, wrongIds:[], trackId:s.trackId}; render(); };
      c.appendChild(again);
    }else{
      sub.textContent=`全${s.cards.length}枚できました。今夜の暗記は完了です。朝のテストに備えましょう。`;
      c.appendChild(sub);
      const home=document.createElement("button"); home.className="btn"; home.textContent="ホームへ";
      home.onclick=()=>{ view.session=null; render(); }; c.appendChild(home);
    }
  }else if(s.mode==="study_loop"){
    // 間違い再暗記の後、またテストへ
    t.textContent="再暗記おつかれさま";
    const sub=document.createElement("div"); sub.className="endsub"; sub.textContent="もう一度確認テストをします。";
    c.appendChild(sub);
    const go=document.createElement("button"); go.className="btn"; go.textContent="確認テスト";
    go.onclick=()=>{ view.session={mode:"test_night", cards:s.cards.slice(), idx:0, revealed:false, wrongIds:[], trackId:s.trackId}; render(); };
    c.appendChild(go);
  }else if(s.mode==="test"){
    // 朝のテスト終了
    t.textContent="朝のテスト完了";
    const wrong=s.wrongIds.length;
    const sub=document.createElement("div"); sub.className="endsub";
    sub.textContent=`${s.cards.length}枚中 ${s.cards.length-wrong}枚正解。まちがえた${wrong}枚は今夜また暗記に入ります。`;
    c.appendChild(sub);
    const home=document.createElement("button"); home.className="btn"; home.textContent="ホームへ";
    home.onclick=()=>{ view.session=null; render(); }; c.appendChild(home);
  }
  app.appendChild(c);
}

function renderDash(){
  if(state.cards.length===0){ const e=document.createElement("div"); e.className="empty"; e.textContent="まだデータがありません。"; app.appendChild(e); return; }
  for(const t of state.tracks){
    const cards = cardsInTrack(t.id);
    if(cards.length===0) continue;
    const c=document.createElement("div"); c.className="card";
    const boxCounts=[0,0,0,0,0];
    cards.forEach(x=>{ boxCounts[Math.min(MAX_BOX,Math.max(1,prog(x,t.id).box||1))-1]++; });
    const mastered=cards.filter(x=>(prog(x,t.id).box||1)>=4).length;
    const title=document.createElement("div"); title.className="dtitle"; title.textContent=t.name; c.appendChild(title);
    const sub=document.createElement("div"); sub.className="dsub";
    let extra;
    if(t.id==="normal"){
      extra=`今夜${nightTargets(t.id).length}枚 ・ 朝${morningTargets(t.id).length}枚`;
    }else{
      extra=`今日${focusTargets(t.id).length}枚`;
    }
    sub.textContent=`全${cards.length}枚 ・ ${extra} ・ 習得(箱4-5) ${Math.round(mastered/cards.length*100)}%`;
    c.appendChild(sub);
    const boxes=document.createElement("div"); boxes.className="boxes";
    const max=Math.max(1,...boxCounts);
    for(let i=0;i<MAX_BOX;i++){
      const col=document.createElement("div"); col.className="bcol";
      const bar=document.createElement("div"); bar.className="bbar"+(i>=3?" m":""); bar.style.height=`${boxCounts[i]/max*64+4}px`;
      const num=document.createElement("div"); num.className="bnum"; num.textContent=boxCounts[i];
      const lbl=document.createElement("div"); lbl.className="blabel"; lbl.textContent=`箱${i+1}`;
      col.appendChild(bar); col.appendChild(num); col.appendChild(lbl); boxes.appendChild(col);
    }
    c.appendChild(boxes); app.appendChild(c);
  }
}

function renderManage(){
  // 通常トラックの日次上限
  const c1=document.createElement("div"); c1.className="card";
  const t1=document.createElement("div"); t1.className="dtitle"; t1.textContent="設定"; c1.appendChild(t1);
  const normalTrack=getTrack("normal");
  const row=document.createElement("div"); row.className="row";
  const lb=document.createElement("label"); lb.textContent="通常トラックの1日の暗記上限（枚）";
  const inp=document.createElement("input"); inp.className="num"; inp.type="number"; inp.min="1"; inp.value=normalTrack.dailyLimit||25;
  inp.onchange=()=>{ const v=parseInt(inp.value)||25; normalTrack.dailyLimit=Math.max(1,v); save(); };
  row.appendChild(lb); row.appendChild(inp); c1.appendChild(row); app.appendChild(c1);

  // インポート
  const c2=document.createElement("div"); c2.className="card";
  const t2=document.createElement("div"); t2.className="dtitle"; t2.textContent="カードのインポート"; c2.appendChild(t2);
  const sub2=document.createElement("div"); sub2.className="dsub"; sub2.textContent="担当チャットが作ったJSON（カード配列、またはトラック定義入り）を貼って追加。既存IDは内容を更新。";
  c2.appendChild(sub2);
  const ta=document.createElement("textarea"); ta.rows=6; ta.placeholder='[{"id":"...","front":"...","back":"...","importance":2}, ...]';
  c2.appendChild(ta);
  const msg=document.createElement("div"); msg.className="msg";
  const ib=document.createElement("button"); ib.className="btn sm"; ib.textContent="インポート";
  ib.onclick=()=>{
    let data; try{ data=JSON.parse(ta.value.trim()); }catch{ msg.textContent="JSONの形式が不正です。"; return; }
    // 形式: 配列（カード） or {tracks:[...], cards:[...]}（トラック定義同梱）
    let cardItems, trackDefs=[];
    if(Array.isArray(data)){ cardItems=data; }
    else { cardItems=data.cards||[]; trackDefs=data.tracks||[]; }
    // トラック定義を先に取り込む
    for(const td of trackDefs){
      if(!td.id||td.id==="normal") continue;
      const ex=getTrack(td.id);
      if(ex){ if(td.name)ex.name=td.name; if(td.dailyLimit)ex.dailyLimit=td.dailyLimit; }
      else state.tracks.push({id:td.id, name:td.name||td.id, dailyLimit:td.dailyLimit||9999});
    }
    let add=0, upd=0;
    for(const it of cardItems){
      if(!it.id||it.front==null||it.back==null) continue;
      // このカードを入れるトラック（省略時 normal）。複数可: it.tracks=[...] or it.track
      let targetTracks = it.tracks || (it.track? [it.track] : ["normal"]);
      const ex=state.cards.find(x=>x.id===it.id);
      const content={ id:it.id, subject:it.subject||"", unit:it.unit||"", type:it.type||"normal",
        front:it.front, back:it.back, importance:it.importance||2, tags:it.tags||[],
        figureSVGFront:it.figureSVGFront||null, figureSVGBack:it.figureSVGBack||null };
      if(ex){
        Object.assign(ex, content);
        ex.progress = ex.progress||{};
        for(const tid of targetTracks){ if(!ex.progress[tid]) ex.progress[tid]=freshProgress(); }
        upd++;
      }else{
        const nc=Object.assign(content,{ progress:{}, createdAt:todayStr() });
        for(const tid of targetTracks){ nc.progress[tid]=freshProgress(); }
        state.cards.push(nc); add++;
      }
    }
    save(); msg.textContent=`追加 ${add} / 更新 ${upd} 件。`+(trackDefs.length?` トラック ${trackDefs.length} 件。`:""); ta.value="";
  };
  c2.appendChild(ib); c2.appendChild(msg); app.appendChild(c2);

  // 個別トラック管理
  const c5=document.createElement("div"); c5.className="card";
  const t5=document.createElement("div"); t5.className="dtitle"; t5.textContent="個別トラック"; c5.appendChild(t5);
  const sub5=document.createElement("div"); sub5.className="dsub"; sub5.textContent="特定範囲を独立して回す枠。カードは通常トラックに残したまま複製されます。";
  c5.appendChild(sub5);
  // 既存の個別トラック一覧
  for(const t of state.tracks){
    if(t.id==="normal") continue;
    const tr=document.createElement("div"); tr.className="row";
    const nm=document.createElement("label"); nm.style.flex="1"; nm.textContent=`${t.name}（${cardsInTrack(t.id).length}枚・上限${t.dailyLimit>=9999?"なし":t.dailyLimit}）`;
    const del=document.createElement("button"); del.className="btn ghost sm"; del.textContent="削除"; del.style.width="auto";
    del.onclick=()=>confirmModal(`個別トラック「${t.name}」を削除します。カード本体は残りますが、このトラックの進捗は消えます。`, ()=>{
      state.tracks=state.tracks.filter(x=>x.id!==t.id);
      state.cards.forEach(c=>{ if(c.progress) delete c.progress[t.id]; });
      save(); render();
    });
    tr.appendChild(nm); tr.appendChild(del); c5.appendChild(tr);
  }
  // 新規作成: 名前＋範囲(subject/unit)＋上限
  const nrow=document.createElement("div"); nrow.className="row";
  const nameIn=document.createElement("input"); nameIn.className="num"; nameIn.style.flex="1"; nameIn.style.width="auto"; nameIn.placeholder="トラック名（例: 期末）";
  nrow.appendChild(nameIn); c5.appendChild(nrow);
  const filterRow=document.createElement("div"); filterRow.className="row";
  const subjIn=document.createElement("input"); subjIn.className="num"; subjIn.style.flex="1"; subjIn.style.width="auto"; subjIn.placeholder="教科（空=全部）";
  const unitIn=document.createElement("input"); unitIn.className="num"; unitIn.style.flex="1"; unitIn.style.width="auto"; unitIn.placeholder="単元（空=全部）";
  filterRow.appendChild(subjIn); filterRow.appendChild(unitIn); c5.appendChild(filterRow);
  const limitRow=document.createElement("div"); limitRow.className="row";
  const limLb=document.createElement("label"); limLb.textContent="1日の上限（空=なし）";
  const limIn=document.createElement("input"); limIn.className="num"; limIn.type="number"; limIn.min="1"; limIn.placeholder="なし";
  limitRow.appendChild(limLb); limitRow.appendChild(limIn); c5.appendChild(limitRow);
  const cmsg=document.createElement("div"); cmsg.className="msg";
  const cb=document.createElement("button"); cb.className="btn sm"; cb.textContent="このトラックを作成";
  cb.onclick=()=>{
    const name=nameIn.value.trim(); if(!name){ cmsg.textContent="トラック名を入れてください。"; return; }
    const id="focus_"+Date.now();
    const limit=parseInt(limIn.value)||9999;
    state.tracks.push({id, name, dailyLimit:limit});
    // 範囲に合うカードを複製（progressにこのトラックを追加）
    const sf=subjIn.value.trim(), uf=unitIn.value.trim();
    let n=0;
    for(const c of state.cards){
      if(sf && c.subject!==sf) continue;
      if(uf && c.unit!==uf) continue;
      c.progress=c.progress||{}; if(!c.progress[id]){ c.progress[id]=freshProgress(); n++; }
    }
    save(); cmsg.textContent=`「${name}」を作成し ${n}枚を追加しました。`; render();
  };
  c5.appendChild(cb); c5.appendChild(cmsg); app.appendChild(c5);

  // エクスポート
  const c3=document.createElement("div"); c3.className="card";
  const t3=document.createElement("div"); t3.className="dtitle"; t3.textContent="成績のエクスポート"; c3.appendChild(t3);
  const sub3=document.createElement("div"); sub3.className="dsub"; sub3.textContent="全データをコピーして担当チャットに渡すと分析できます。";
  c3.appendChild(sub3);
  const eb=document.createElement("button"); eb.className="btn sm"; eb.textContent="全データをコピー";
  const emsg=document.createElement("div"); emsg.className="msg";
  eb.onclick=async()=>{
    const text=JSON.stringify({tracks:state.tracks, cards:state.cards});
    let ok=false;
    try{ if(navigator.clipboard&&window.isSecureContext){ await navigator.clipboard.writeText(text); ok=true; } }catch{}
    if(!ok){ const t=document.createElement("textarea"); t.value=text; t.style.position="fixed"; t.style.opacity="0"; document.body.appendChild(t); t.select(); try{ok=document.execCommand("copy");}catch{} document.body.removeChild(t); }
    emsg.textContent = ok? "コピーしました。" : "コピー失敗。下の欄から手動でコピーしてください。";
    if(!ok){ const t=document.createElement("textarea"); t.rows=4; t.value=text; c3.appendChild(t); }
  };
  c3.appendChild(eb); c3.appendChild(emsg); app.appendChild(c3);

  // リセット
  const c4=document.createElement("div"); c4.className="card";
  const rb=document.createElement("button"); rb.className="btn ghost sm"; rb.textContent="全データを消去";
  rb.onclick=()=>{ confirmModal("すべてのカードと成績を消去します。よろしいですか？この操作は取り消せません。", ()=>{ state=JSON.parse(JSON.stringify(DEFAULTS)); save(); render(); }); };
  c4.appendChild(rb); app.appendChild(c4);
}

function freshProgress(){ return { box:1, dueDate:todayStr(), phase:"new", history:[] }; }

// initial render (KaTeX may load slightly after; re-render on load)
render();
window.addEventListener("load", ()=>render());
</script>
